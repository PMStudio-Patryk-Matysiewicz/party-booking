{% extends "base.html" %}

{% block title %}Rejestracja - KlubEvents{% endblock %}

{% block content %}
<div class="auth-card">
    <h1 class="auth-logo">◆ KlubEvents</h1>
    <h2>Utwórz konto</h2>

    {% if let Some(error) = error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/auth/register">
        <div class="form-group">
            <label for="username">Nazwa użytkownika</label>
            <input type="text" id="username" name="username" required placeholder="jan_kowalski">
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="jan@example.com">
        </div>
        <div class="form-group">
            <label for="password">Hasło</label>
            <input type="password" id="password" name="password" required placeholder="min. 6 znaków">
        </div>
        <div class="form-group">
            <label for="confirm_password">Potwierdź hasło</label>
            <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-full">
            Zarejestruj się
        </button>
    </form>

    <p class="auth-link">
        Masz już konto? <a href="/auth/login">Zaloguj się</a>
    </p>
</div>
{% endblock %}
